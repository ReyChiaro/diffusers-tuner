defaults:
  - pipelines: qwenimage_edit_plus
  - adapters: lora
  - loss: flow_matching

  - _self_


# Runtime
project_name: pipeline_finetune
timestamp: ${now:%Y%m%d-%H%M%S}
output_dir: outputs/${project_name}/${timestamp}
logging_dir: ${output_dir}/logs
save_dir: ${output_dir}/checkpoints


# Accelerator
accelerator:
  mixed_precision: bf16
  gradient_accumulation_steps: 1
  log_with: tensorboard


# Tuning
tune:
  seed: 42
  max_grad_norm: 1.0
  max_tuning_steps: 2000
  save_steps: 500
  eval_steps: 500
  save_dir: ${save_dir}
  

# Hydra
hydra:
  run:
    dir: ${output_dir}/hydra-configs